replicaCount: 2

image:
  repository: 002369670798.dkr.ecr.ap-south-1.amazonaws.com/gitops-app
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-secret

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  name: gitops-app-ingress
  className: alb
  scheme: internet-facing
  targetType: ip
  subnets: "subnet-02a6d6caea53ca8c3,subnet-002fe003aab1aca96"
  path: /
  pathType: Prefix
